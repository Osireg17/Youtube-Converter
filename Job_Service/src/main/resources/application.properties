spring.application.name=job-service

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
# Expects a full JDBC URL, e.g. jdbc:postgresql://host:5432/dbname
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
# Expects an AMQP URL, e.g. amqp://user:pass@host:5672/vhost
spring.rabbitmq.addresses=${RABBITMQ_URL}

# ─── AWS S3 ───────────────────────────────────────────────────────────────────
aws.s3.access-key-id=${ACCESS_KEY_ID:${AWS_ACCESS_KEY_ID:}}
aws.s3.secret-access-key=${SECRET_ACCESS_KEY:${AWS_SECRET_ACCESS_KEY:}}
aws.s3.region=${REGION:${AWS_DEFAULT_REGION:}}
aws.s3.endpoint=${ENDPOINT:${AWS_ENDPOINT_URL:}}
aws.s3.bucket-name=${BUCKET_NAME:${BUCKET:${AWS_S3_BUCKET_NAME:}}}

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ─── CORS ─────────────────────────────────────────────────────────────────────
# Comma-separated list of allowed origins, e.g. https://my-frontend.railway.app
cors.allowed-origins=${ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:http://localhost:5173}}

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
