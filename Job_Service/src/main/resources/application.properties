spring.application.name=job-service

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
# Expects a full JDBC URL, e.g. jdbc:postgresql://host:5432/dbname
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
# Expects an AMQP URL, e.g. amqp://user:pass@host:5672/vhost
spring.rabbitmq.addresses=${RABBITMQ_URL}

# ─── AWS S3 ───────────────────────────────────────────────────────────────────
aws.s3.access-key-id=${ACCESS_KEY_ID}
aws.s3.secret-access-key=${SECRET_ACCESS_KEY}
aws.s3.region=${REGION}
aws.s3.endpoint=${ENDPOINT:}

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
